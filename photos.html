<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Photos — Raccoon Events</title>
<style>
  :root { --bg:#f7f6f3; --fg:#23282d; --muted:#5f6b76; --border:#e2e0da;
          --card:#ffffff; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#16191c; --fg:#e8e6e1; --muted:#9aa5ae; --border:#2c333a;
            --card:#1f2429; }
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--fg);
         font: 17px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif; }
  main { max-width: 640px; margin: 0 auto; padding: 48px 24px 64px; }
  .mask { font-size: 56px; line-height: 1; }
  h1 { font-size: 32px; letter-spacing: -0.02em; margin: 12px 0 8px; }
  p.tag { color: var(--muted); margin-bottom: 28px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ph { aspect-ratio: 1; border: 1px dashed var(--border); border-radius: 12px;
        background: var(--card); display: flex; align-items: center;
        justify-content: center; font-size: 26px; opacity: .7; }
  footer { margin-top: 36px; color: var(--muted); font-size: 14.5px; }
  a { color: inherit; }
</style>
</head>
<body>
<main>
  <div class="mask" role="img" aria-label="raccoon">🦝</div>
  <h1>Party photos</h1>
  <p class="tag">Photo albums from each event are shared here with the
     guests who attended. Check back after the next party — or watch for
     the link in your recap message.</p>
  <div class="grid">
    <div class="ph">📷</div><div class="ph">🪩</div><div class="ph">🎉</div>
    <div class="ph">🌙</div><div class="ph">🕺</div><div class="ph">✨</div>
  </div>
  <footer>
    <a href="/">Raccoon Events</a> ·
    <a href="/privacy.html">Privacy Policy</a> ·
    <a href="/terms.html">SMS Terms &amp; Conditions</a>
  </footer>
</main>
</body>
</html>
